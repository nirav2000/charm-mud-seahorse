<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive grammar highlighter with real-time tagging, style settings, and version history."
    />
    <title>Grammar Highlighter</title>
    <script src="https://unpkg.com/compromise"></script>
    <style>
      :root {
        --bg: #f7fbff;
        --card: #ffffff;
        --ink: #1d2433;
        --muted: #59637d;
      }
      body {
        margin: 0;
        font-family: "Nunito", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at top left, #f4f8ff, #f8fdfc 55%, #fff8f6);
      }
      .app {
        max-width: 1020px;
        margin: 26px auto;
        padding: 0 16px 24px;
      }
      .hero,
      .panel {
        background: var(--card);
        border-radius: 18px;
        box-shadow: 0 12px 28px rgba(45, 65, 120, 0.08);
      }
      .hero {
        padding: 24px;
        margin-bottom: 14px;
      }
      .hero h1 { margin: 0; }
      .hero p { margin: 8px 0 0; color: var(--muted); }
      .panel { padding: 16px; margin-bottom: 12px; }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: start;
      }
      textarea,
      input {
        width: 100%;
        border: 1px solid #cfd9f1;
        border-radius: 12px;
        font-family: inherit;
        font-size: 1rem;
        padding: 10px 12px;
        box-sizing: border-box;
      }
      textarea { min-height: 82px; resize: vertical; }
      button {
        border: none;
        border-radius: 12px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
        background: #315af8;
        color: white;
      }
      button.secondary { background: #5d6b89; }
      #status { color: var(--muted); margin-top: 8px; }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 8px;
      }
      .setting-item {
        background: #f5f8ff;
        border-radius: 10px;
        padding: 8px 10px;
        border: 1px solid #d9e2fb;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.95rem;
      }

      .sentence {
        line-height: 2.2;
        font-size: 2rem;
        font-weight: 700;
        word-spacing: 3px;
        margin-top: 8px;
      }
      .token {
        position: relative;
        display: inline;
        border-radius: 8px;
        padding: 0 4px;
        transition: all 0.2s;
      }
      .token + .token { margin-left: 3px; }
      .token-label-inline {
        font-size: 0.66rem;
        font-weight: 700;
        vertical-align: super;
        margin-left: 2px;
        color: #556;
      }

      .curvy-row {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        color: #495370;
        font-size: 0.85rem;
      }
      .curvy-chip::before {
        content: "↷ ";
        font-weight: 700;
      }

      .legend {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
      }
      .swatch {
        width: 14px;
        height: 14px;
        border-radius: 3px;
        border: 1px solid rgba(0,0,0,0.2);
      }

      .pronoun { color: #2e76c2; background: #e3f3ff; }
      .verb { color: #1e8f5e; background: #e4fff2; }
      .noun { color: #b72d49; background: #ffe6ed; }
      .article { color: #8f7a04; background: #fff6c9; }
      .adjective { color: #a83895; background: #ffe4f7; }
      .adverb { color: #646464; background: #ececec; }
      .preposition { color: #09799a; background: #ddf6ff; }
      .conjunction { color: #9b6b0f; background: #fdf0cb; }
      .determiner { color: #157f70; background: #defdf5; }
      .interjection { color: #6e4ca7; background: #efe5ff; }
      .unknown { color: #4f5c73; background: #edf1f8; }

      .text-color-mode .token { background: transparent !important; padding: 0; }

      footer { margin-top: 18px; border-top: 1px solid #d7e2f7; padding-top: 12px; }
      #version-button { background: #f4f7ff; color: #223; border: 1px solid #bdc7e9; border-radius: 999px; }
      #version-modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 10; }
      #version-modal.open { display: flex; }
      .modal-content { width: min(860px, 92vw); max-height: 86vh; overflow-y: auto; background: #fff; border-radius: 12px; padding: 16px; }
      .modal-header { display: flex; justify-content: space-between; align-items: center; }
      .modal-close { border: none; background: transparent; color: #222; font-size: 24px; cursor: pointer; }
      .version-controls { margin: 10px 0; display: flex; gap: 8px; }

      @media (max-width: 760px) {
        .controls { grid-template-columns: 1fr; }
        .sentence { font-size: 1.5rem; line-height: 2; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>Grammar Playground ✨</h1>
        <p>Write a sentence and see grammar markers appear as you type.</p>
      </section>

      <section class="panel">
        <div class="controls">
          <textarea id="sentence-input" placeholder="Type a sentence to analyze in real time..."></textarea>
          <button id="analyze-btn" type="button">Analyze now</button>
          <button id="random-btn" type="button" class="secondary">Use random sample</button>
        </div>
        <p id="status" role="status" aria-live="polite">Loading sentence…</p>
        <div id="output"></div>
        <div id="curvy-row" class="curvy-row"></div>
      </section>

      <section class="panel">
        <h3 style="margin:0 0 8px">Display settings</h3>
        <div class="settings-grid">
          <label class="setting-item"><input type="checkbox" id="setting-realtime" checked />Realtime tagging</label>
          <label class="setting-item"><input type="checkbox" id="setting-text-color" />Color text (not background)</label>
          <label class="setting-item"><input type="checkbox" id="setting-labels" checked />Show inline labels</label>
          <label class="setting-item"><input type="checkbox" id="setting-curvy" />Show curvy arrow labels</label>
        </div>
      </section>

      <section class="panel">
        <label for="word-input"><strong>Single word checker</strong></label>
        <input type="text" id="word-input" placeholder="Type one word..." />
        <p id="result">Grammar Type: <span id="grammar-type">---</span></p>
      </section>

      <section class="panel">
        <h3 style="margin-top:0">Color key</h3>
        <div id="legend" class="legend"></div>
      </section>

      <footer>
        <button id="version-button" type="button" aria-haspopup="dialog" aria-controls="version-modal">
          Version <span id="version-label">1.1.4</span>
        </button>
      </footer>
    </main>

    <div id="version-modal" role="dialog" aria-modal="true" aria-labelledby="version-title">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="version-title">Version History</h3>
          <button class="modal-close" id="close-modal" aria-label="Close">×</button>
        </div>
        <div class="version-controls">
          <button id="prev-version" type="button">Open previous version</button>
          <button id="next-version" type="button">Open newer version</button>
        </div>
        <div id="version-history-rendered">Loading history…</div>
      </div>
    </div>

    <script src="../../versioning.js"></script>
    <script>
      const CURRENT_VERSION = "1.1.4";
      let sentences = [];
      const TAG_ORDER = ["article", "noun", "pronoun", "verb", "adjective", "adverb", "determiner", "preposition", "conjunction", "interjection", "unknown"];
      const manualRules = {
        prepositions: ["to", "in", "on", "at", "by", "with", "about", "against", "between", "into", "through", "past", "under", "over", "near"],
        conjunctions: ["and", "or", "but", "so", "yet", "for", "nor"],
        determiners: ["this", "that", "these", "those", "my", "your", "his", "her", "its", "our", "their"],
        interjections: ["wow", "oops", "hey", "ouch", "bravo", "alas"]
      };

      const settings = {
        realtime: true,
        textColor: false,
        labels: true,
        curvy: false
      };

      const output = document.getElementById("output");
      const curvyRow = document.getElementById("curvy-row");
      const grammarType = document.getElementById("grammar-type");
      const status = document.getElementById("status");
      const wordInput = document.getElementById("word-input");
      const sentenceInput = document.getElementById("sentence-input");
      const legend = document.getElementById("legend");

      function normalizeWord(word) {
        return word.toLowerCase().replace(/^[^a-z']+|[^a-z']+$/g, "");
      }

      function getWordClass(word, doc) {
        const normalized = normalizeWord(word);
        if (!normalized) return "unknown";
        if (doc.match(normalized).has("#Pronoun")) return "pronoun";
        if (doc.match(normalized).has("#Verb")) return "verb";
        if (doc.match(normalized).has("#Noun")) return "noun";
        if (doc.match(normalized).has("#Adjective")) return "adjective";
        if (doc.match(normalized).has("#Adverb")) return "adverb";
        if (["the", "a", "an"].includes(normalized)) return "article";
        if (manualRules.prepositions.includes(normalized)) return "preposition";
        if (manualRules.conjunctions.includes(normalized)) return "conjunction";
        if (manualRules.determiners.includes(normalized)) return "determiner";
        if (manualRules.interjections.includes(normalized)) return "interjection";
        return "unknown";
      }

      function renderLegend() {
        legend.innerHTML = TAG_ORDER.map((tag) =>
          `<div class="legend-item"><span class="swatch ${tag}"></span><span>${tag}</span></div>`
        ).join("");
      }

      function identifyGrammar(sentence) {
        const words = sentence.match(/\S+/g) || [];
        const doc = nlp(sentence);

        const rendered = words.map((word) => {
          const wordClass = getWordClass(word, doc);
          const label = settings.labels ? `<span class="token-label-inline">${wordClass}</span>` : "";
          return {
            html: `<span class="token ${wordClass}" title="${wordClass}">${word}${label}</span>`,
            word,
            wordClass
          };
        });

        return rendered;
      }

      function renderSentence(sentence) {
        if (!sentence.trim()) {
          output.innerHTML = "<em>Please type a sentence first.</em>";
          curvyRow.innerHTML = "";
          return;
        }

        const rendered = identifyGrammar(sentence);
        output.classList.toggle("text-color-mode", settings.textColor);
        output.innerHTML = `<div class="sentence">${rendered.map((item) => item.html).join(" ")}</div>`;

        if (settings.curvy) {
          curvyRow.innerHTML = rendered.map((item) =>
            `<span class="curvy-chip"><strong>${item.word}</strong> → ${item.wordClass}</span>`
          ).join(" ");
        } else {
          curvyRow.innerHTML = "";
        }
      }

      function checkWord() {
        const inputWord = wordInput.value.trim();
        if (inputWord === "") {
          grammarType.textContent = "---";
          return;
        }

        const normalized = normalizeWord(inputWord);
        const doc = nlp(normalized);
        let detectedType = "Unknown";

        if (doc.has("#Pronoun")) detectedType = "Pronoun";
        else if (doc.has("#Verb")) detectedType = "Verb";
        else if (doc.has("#Noun")) detectedType = "Noun";
        else if (doc.has("#Adjective")) detectedType = "Adjective";
        else if (doc.has("#Adverb")) detectedType = "Adverb";
        else if (["the", "a", "an"].includes(normalized)) detectedType = "Article";
        else if (manualRules.prepositions.includes(normalized)) detectedType = "Preposition";
        else if (manualRules.conjunctions.includes(normalized)) detectedType = "Conjunction";
        else if (manualRules.determiners.includes(normalized)) detectedType = "Determiner";
        else if (manualRules.interjections.includes(normalized)) detectedType = "Interjection";

        grammarType.textContent = detectedType;
      }

      async function fetchSentences() {
        const response = await fetch("sentences.json");
        if (!response.ok) throw new Error(`Unable to load sentences.json (${response.status})`);
        const data = await response.json();
        if (!Array.isArray(data.sentences) || data.sentences.length === 0) throw new Error("sentences.json has no sentences array");
        sentences = data.sentences;
      }

      async function useRandomSentence() {
        try {
          if (sentences.length === 0) await fetchSentences();
          const randomSentence = sentences[Math.floor(Math.random() * sentences.length)];
          sentenceInput.value = randomSentence;
          renderSentence(randomSentence);
          status.textContent = "Loaded a random sentence.";
        } catch (error) {
          status.textContent = `Could not load sample sentence: ${error.message}`;
        }
      }

      function wireSettings() {
        document.getElementById("setting-realtime").addEventListener("change", (e) => {
          settings.realtime = e.target.checked;
        });
        document.getElementById("setting-text-color").addEventListener("change", (e) => {
          settings.textColor = e.target.checked;
          renderSentence(sentenceInput.value);
        });
        document.getElementById("setting-labels").addEventListener("change", (e) => {
          settings.labels = e.target.checked;
          renderSentence(sentenceInput.value);
        });
        document.getElementById("setting-curvy").addEventListener("change", (e) => {
          settings.curvy = e.target.checked;
          renderSentence(sentenceInput.value);
        });
      }

      sentenceInput.addEventListener("input", () => {
        if (settings.realtime) renderSentence(sentenceInput.value);
      });
      document.getElementById("analyze-btn").addEventListener("click", () => renderSentence(sentenceInput.value));
      document.getElementById("random-btn").addEventListener("click", useRandomSentence);
      wordInput.addEventListener("input", checkWord);

      renderLegend();
      wireSettings();
      useRandomSentence();
      initVersioning({ currentVersion: CURRENT_VERSION, rootPrefix: "../../" });
    </script>
  </body>
</html>
