<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive grammar highlighter with real-time tagging, curved arrow annotations, and version history."
    />
    <title>Grammar Highlighter</title>
    <script src="https://unpkg.com/compromise"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      :root {
        --ink: #1a2238;
        --muted: #5f6b86;
      }
      body {
        margin: 0;
        font-family: "Nunito", "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 5% 10%, #fff2e4 0, transparent 35%),
          radial-gradient(circle at 90% 0%, #e4f5ff 0, transparent 34%),
          radial-gradient(circle at 80% 90%, #eefde9 0, transparent 28%),
          #f8fbff;
      }
      .app {
        max-width: 1080px;
        margin: 22px auto;
        padding: 0 16px 24px;
      }
      .hero,
      .panel {
        background: linear-gradient(145deg, rgba(255,255,255,.88), rgba(255,255,255,.72));
        backdrop-filter: blur(3px);
        border: 1px solid rgba(180, 197, 236, 0.4);
        border-radius: 20px;
        box-shadow: 0 12px 30px rgba(33, 58, 122, 0.08);
      }
      .hero { padding: 22px; margin-bottom: 12px; }
      .hero h1 { margin: 0; font-size: 2.1rem; }
      .hero p { margin: 8px 0 0; color: var(--muted); }
      .panel { padding: 16px; margin-bottom: 12px; }

      .controls {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        align-items: start;
      }
      textarea,
      input {
        width: 100%;
        border: 1px solid #c6d3f3;
        border-radius: 12px;
        font-family: inherit;
        font-size: 1rem;
        padding: 10px 12px;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.92);
      }
      textarea { min-height: 90px; resize: vertical; }
      button {
        border: none;
        border-radius: 12px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 700;
        background: linear-gradient(120deg, #3562ff, #4f74ff);
        color: white;
      }
      button.secondary { background: linear-gradient(120deg, #5d6b89, #7180a2); }

      #status { color: var(--muted); margin: 8px 0 0; }

      .sentence {
        line-height: 2.7;
        font-size: 2rem;
        font-weight: 800;
        margin-top: 10px;
        word-spacing: 4px;
      }
      .token {
        position: relative;
        display: inline;
        padding: 0 2px;
        border-radius: 6px;
      }
      .token-label-inline {
        font-size: 0.66rem;
        vertical-align: super;
        margin-left: 2px;
        color: #4d5a77;
      }

      .arrow-mode .token {
        padding-top: 16px;
      }
      .arrow-mode .token[data-pos]::before {
        content: attr(data-pos);
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        top: -14px;
        font-size: 0.64rem;
        font-weight: 700;
        color: #3f4e72;
        white-space: nowrap;
      }
      .arrow-mode .token[data-pos]::after {
        content: "";
        position: absolute;
        left: 50%;
        top: -2px;
        width: 18px;
        height: 12px;
        border-left: 2px solid rgba(62, 78, 120, 0.65);
        border-bottom: 2px solid rgba(62, 78, 120, 0.65);
        border-radius: 0 0 0 14px;
        transform: translateX(-2px) rotate(-20deg);
      }

      .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }
      .setting-item {
        background: rgba(243, 248, 255, 0.92);
        border: 1px solid #d4def7;
        border-radius: 12px;
        padding: 10px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .setting-item input { width: 18px; height: 18px; margin-top: 3px; }
      .setting-copy strong { display: block; font-size: 0.95rem; }
      .setting-copy span { font-size: 0.84rem; color: #6a7691; }

      .legend {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
      }
      .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
      .swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid rgba(0,0,0,.15); }

      .pronoun { color: #2e76c2; background: #e4f2ff; }
      .verb { color: #1e8f5e; background: #e3fff1; }
      .noun { color: #b72d49; background: #ffe5ec; }
      .article { color: #8f7a04; background: #fff5c6; }
      .adjective { color: #a83895; background: #ffe3f7; }
      .adverb { color: #646464; background: #ececec; }
      .preposition { color: #09799a; background: #dff6ff; }
      .conjunction { color: #9b6b0f; background: #fcefc9; }
      .determiner { color: #157f70; background: #defdf5; }
      .interjection { color: #6e4ca7; background: #efe4ff; }
      .unknown { color: #4f5c73; background: #edf1f8; }
      .text-color-mode .token { background: transparent !important; }

      footer { margin-top: 16px; border-top: 1px solid #d7e2f7; padding-top: 12px; }
      #version-button { background: #f3f7ff; color: #223; border: 1px solid #bdc7e9; border-radius: 999px; }
      #version-modal { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: center; justify-content: center; z-index: 10; }
      #version-modal.open { display: flex; }
      .modal-content { width: min(900px, 94vw); max-height: 86vh; overflow-y: auto; background: #fff; border-radius: 12px; padding: 16px; }
      .modal-header { display: flex; justify-content: space-between; align-items: center; }
      .modal-close { border: none; background: transparent; color: #222; font-size: 24px; cursor: pointer; }
      .version-controls { margin: 10px 0; display: flex; gap: 8px; }

      @media (max-width: 760px) {
        .controls { grid-template-columns: 1fr; }
        .sentence { font-size: 1.55rem; line-height: 2.3; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>Grammar Playground ✨</h1>
        <p>Write a sentence and watch grammar markers appear in real time.</p>
      </section>

      <section class="panel">
        <div class="controls">
          <textarea id="sentence-input" placeholder="Type a sentence to analyze..."></textarea>
          <button id="analyze-btn" type="button">Analyze now</button>
          <button id="random-btn" type="button" class="secondary">Use random sample</button>
        </div>
        <p id="status" role="status" aria-live="polite">Loading sentence…</p>
        <div id="output"></div>
      </section>

      <section class="panel">
        <h3 style="margin:0 0 8px">Display settings</h3>
        <div class="settings-grid">
          <label class="setting-item">
            <input type="checkbox" id="setting-realtime" checked />
            <span class="setting-copy"><strong>Realtime tagging</strong><span>Update grammar marks while typing.</span></span>
          </label>
          <label class="setting-item">
            <input type="checkbox" id="setting-text-color" />
            <span class="setting-copy"><strong>Color text only</strong><span>Use text color instead of highlighted backgrounds.</span></span>
          </label>
          <label class="setting-item">
            <input type="checkbox" id="setting-labels" checked />
            <span class="setting-copy"><strong>Inline labels</strong><span>Show tiny label text beside each word.</span></span>
          </label>
          <label class="setting-item">
            <input type="checkbox" id="setting-curvy" />
            <span class="setting-copy"><strong>Curved arrows</strong><span>Draw curved pointers with POS labels above words.</span></span>
          </label>
        </div>
      </section>

      <section class="panel">
        <label for="word-input"><strong>Single word checker</strong></label>
        <input type="text" id="word-input" placeholder="Type one word..." />
        <p id="result">Grammar Type: <span id="grammar-type">---</span></p>
      </section>

      <section class="panel">
        <h3 style="margin-top:0">Color key</h3>
        <div id="legend" class="legend"></div>
      </section>

      <footer>
        <button id="version-button" type="button" aria-haspopup="dialog" aria-controls="version-modal">
          Version <span id="version-label">1.1.5</span>
        </button>
      </footer>
    </main>

    <div id="version-modal" role="dialog" aria-modal="true" aria-labelledby="version-title">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="version-title">Version History</h3>
          <button class="modal-close" id="close-modal" aria-label="Close">×</button>
        </div>
        <div class="version-controls">
          <button id="prev-version" type="button">Open previous version</button>
          <button id="next-version" type="button">Open newer version</button>
        </div>
        <div id="version-history-rendered">Loading history…</div>
      </div>
    </div>

    <script src="../../versioning.js"></script>
    <script>
      const CURRENT_VERSION = "1.1.5";
      let sentences = [];
      const TAG_ORDER = ["article", "noun", "pronoun", "verb", "adjective", "adverb", "determiner", "preposition", "conjunction", "interjection", "unknown"];
      const manualRules = {
        prepositions: ["to", "in", "on", "at", "by", "with", "about", "against", "between", "into", "through", "past", "under", "over", "near"],
        conjunctions: ["and", "or", "but", "so", "yet", "for", "nor"],
        determiners: ["this", "that", "these", "those", "my", "your", "his", "her", "its", "our", "their"],
        interjections: ["wow", "oops", "hey", "ouch", "bravo", "alas"]
      };
      const settings = { realtime: true, textColor: false, labels: true, curvy: false };

      const output = document.getElementById("output");
      const grammarType = document.getElementById("grammar-type");
      const status = document.getElementById("status");
      const wordInput = document.getElementById("word-input");
      const sentenceInput = document.getElementById("sentence-input");
      const legend = document.getElementById("legend");

      function normalizeWord(word) {
        return word.toLowerCase().replace(/^[^a-z']+|[^a-z']+$/g, "");
      }

      function getWordClass(word, doc) {
        const normalized = normalizeWord(word);
        if (!normalized) return "unknown";
        if (doc.match(normalized).has("#Pronoun")) return "pronoun";
        if (doc.match(normalized).has("#Verb")) return "verb";
        if (doc.match(normalized).has("#Noun")) return "noun";
        if (doc.match(normalized).has("#Adjective")) return "adjective";
        if (doc.match(normalized).has("#Adverb")) return "adverb";
        if (["the", "a", "an"].includes(normalized)) return "article";
        if (manualRules.prepositions.includes(normalized)) return "preposition";
        if (manualRules.conjunctions.includes(normalized)) return "conjunction";
        if (manualRules.determiners.includes(normalized)) return "determiner";
        if (manualRules.interjections.includes(normalized)) return "interjection";
        return "unknown";
      }

      function renderLegend() {
        legend.innerHTML = TAG_ORDER.map((tag) =>
          `<div class="legend-item"><span class="swatch ${tag}"></span><span>${tag}</span></div>`
        ).join("");
      }

      function identifyGrammar(sentence) {
        const words = sentence.match(/\S+/g) || [];
        const doc = nlp(sentence);
        return words.map((word) => {
          const wordClass = getWordClass(word, doc);
          const label = settings.labels ? `<span class="token-label-inline">${wordClass}</span>` : "";
          return `<span class="token ${wordClass}" data-pos="${wordClass}" title="${wordClass}">${word}${label}</span>`;
        });
      }

      function renderSentence(sentence) {
        if (!sentence.trim()) {
          output.innerHTML = "<em>Please type a sentence first.</em>";
          return;
        }
        output.classList.toggle("text-color-mode", settings.textColor);
        output.classList.toggle("arrow-mode", settings.curvy);
        const rendered = identifyGrammar(sentence);
        output.innerHTML = `<div class="sentence">${rendered.join(" ")}</div>`;
      }

      function checkWord() {
        const inputWord = wordInput.value.trim();
        if (!inputWord) {
          grammarType.textContent = "---";
          return;
        }
        const normalized = normalizeWord(inputWord);
        const doc = nlp(normalized);
        let detectedType = "Unknown";
        if (doc.has("#Pronoun")) detectedType = "Pronoun";
        else if (doc.has("#Verb")) detectedType = "Verb";
        else if (doc.has("#Noun")) detectedType = "Noun";
        else if (doc.has("#Adjective")) detectedType = "Adjective";
        else if (doc.has("#Adverb")) detectedType = "Adverb";
        else if (["the", "a", "an"].includes(normalized)) detectedType = "Article";
        else if (manualRules.prepositions.includes(normalized)) detectedType = "Preposition";
        else if (manualRules.conjunctions.includes(normalized)) detectedType = "Conjunction";
        else if (manualRules.determiners.includes(normalized)) detectedType = "Determiner";
        else if (manualRules.interjections.includes(normalized)) detectedType = "Interjection";
        grammarType.textContent = detectedType;
      }

      async function fetchSentences() {
        const response = await fetch("sentences.json");
        if (!response.ok) throw new Error(`Unable to load sentences.json (${response.status})`);
        const data = await response.json();
        if (!Array.isArray(data.sentences) || data.sentences.length === 0) throw new Error("sentences.json has no sentences array");
        sentences = data.sentences;
      }

      async function useRandomSentence() {
        try {
          if (!sentences.length) await fetchSentences();
          const randomSentence = sentences[Math.floor(Math.random() * sentences.length)];
          sentenceInput.value = randomSentence;
          renderSentence(randomSentence);
          status.textContent = "Loaded a random sentence.";
        } catch (error) {
          status.textContent = `Could not load sample sentence: ${error.message}`;
        }
      }

      function wireSettings() {
        document.getElementById("setting-realtime").addEventListener("change", (e) => settings.realtime = e.target.checked);
        document.getElementById("setting-text-color").addEventListener("change", (e) => { settings.textColor = e.target.checked; renderSentence(sentenceInput.value); });
        document.getElementById("setting-labels").addEventListener("change", (e) => { settings.labels = e.target.checked; renderSentence(sentenceInput.value); });
        document.getElementById("setting-curvy").addEventListener("change", (e) => { settings.curvy = e.target.checked; renderSentence(sentenceInput.value); });
      }

      sentenceInput.addEventListener("input", () => {
        if (settings.realtime) renderSentence(sentenceInput.value);
      });
      document.getElementById("analyze-btn").addEventListener("click", () => renderSentence(sentenceInput.value));
      document.getElementById("random-btn").addEventListener("click", useRandomSentence);
      wordInput.addEventListener("input", checkWord);

      renderLegend();
      wireSettings();
      useRandomSentence();
      initVersioning({ currentVersion: CURRENT_VERSION, rootPrefix: "../../" });
    </script>
  </body>
</html>
