<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammar Playground</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/compromise"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-bar">
        <div class="wordmark-wrap">
          <span class="wordmark-dot">G</span>
          <h1 class="wordmark">Grammar Playground</h1>
        </div>
        <div class="app-bar-actions">
          <button id="settings-btn" class="icon-btn" aria-label="Open settings">⚙</button>
          <button id="history-btn" class="ghost-btn">Version history</button>
        </div>
      </header>

      <section class="card sentence-card" aria-labelledby="sentence-heading">
        <h2 id="sentence-heading">Sentence input</h2>
        <div class="sentence-layout">
          <textarea id="sentence-input" placeholder="Type a sentence for analysis..."></textarea>
          <div class="sentence-actions">
            <button id="analyze-btn" class="primary-btn">Analyze sentence</button>
            <button id="sample-btn" class="secondary-btn">Use sample</button>
          </div>
        </div>
        <p id="status" class="status" role="status" aria-live="polite">Ready.</p>
      </section>

      <section class="card canvas-card" aria-labelledby="canvas-heading">
        <h2 id="canvas-heading">Analysis canvas</h2>
        <div id="analysis-canvas" class="analysis-canvas">
          <svg id="connector-layer" class="connector-layer" aria-hidden="true"></svg>
          <div id="label-layer" class="label-layer"></div>
          <div id="token-layer" class="token-layer"></div>
        </div>
      </section>

      <section class="card checker-card" aria-labelledby="checker-heading">
        <h2 id="checker-heading">Single-word checker</h2>
        <div class="checker-grid">
          <input id="word-input" type="text" placeholder="Type one word" />
          <div class="checker-result">
            <p><strong>Detected type:</strong> <span id="grammar-type">—</span></p>
            <p id="grammar-explanation" class="muted">Enter a word to see grammar guidance.</p>
          </div>
        </div>
      </section>
    </div>

    <aside id="settings-drawer" class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <h3>Settings</h3>
        <button id="settings-close" class="icon-btn" aria-label="Close settings">×</button>
      </div>
      <button class="toggle-btn is-on" data-setting="autoPunctuate">Auto punctuation</button>
      <button class="toggle-btn is-on" data-setting="showLabels">Show labels</button>
      <button class="toggle-btn is-on" data-setting="showConnectors">Show connectors</button>
    </aside>

    <aside id="history-drawer" class="drawer" aria-hidden="true">
      <div class="drawer-header">
        <h3>Version history</h3>
        <button id="history-close" class="icon-btn" aria-label="Close history">×</button>
      </div>
      <div id="version-timeline" class="timeline"></div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
